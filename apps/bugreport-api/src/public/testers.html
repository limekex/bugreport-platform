<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Report — Tester Management</title>
  <style>
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f3f4f6; color: #111827; line-height: 1.5;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }

    .nav {
      display: flex; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid #d1d5db;
    }
    .nav a {
      color: #6b7280; text-decoration: none; font-weight: 500;
    }
    .nav a.active {
      color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: .5rem;
    }

    table {
      width: 100%; border-collapse: collapse; background: #fff;
      border-radius: .5rem; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      margin-bottom: 1.5rem;
    }
    th, td { text-align: left; padding: .75rem; font-size: .8125rem; }
    th { background: #f9fafb; font-weight: 600; color: #6b7280; text-transform: uppercase; font-size: .6875rem; letter-spacing: .05em; }
    tr:not(:last-child) td { border-bottom: 1px solid #f3f4f6; }

    .badge {
      display: inline-block; padding: .25rem .5rem; border-radius: .25rem;
      font-size: .75rem; font-weight: 500;
    }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }

    .actions { display: flex; gap: .375rem; }
    .btn-sm {
      padding: .25rem .5rem; font-size: .75rem; border: none; border-radius: .25rem;
      cursor: pointer; color: #fff;
    }
    .btn-toggle { background: #f59e0b; }
    .btn-toggle:hover { background: #d97706; }
    .btn-delete { background: #ef4444; }
    .btn-delete:hover { background: #dc2626; }

    .btn-add {
      padding: .5rem 1rem; background: #10b981; color: #fff; border: none;
      border-radius: .375rem; cursor: pointer; font-size: .875rem; margin-bottom: 1rem;
    }
    .btn-add:hover { background: #059669; }

    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
      justify-content: center; align-items: center; z-index: 1000;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: .5rem; padding: 1.5rem; width: 480px;
      max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal h2 { font-size: 1.125rem; margin-bottom: 1rem; }
    .field { margin-bottom: .75rem; }
    .field label { display: block; font-size: .75rem; font-weight: 600; color: #6b7280; margin-bottom: .25rem; }
    .field input {
      width: 100%; padding: .5rem .75rem; border: 1px solid #d1d5db;
      border-radius: .375rem; font-size: .875rem;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1rem; }
    .btn-cancel {
      padding: .5rem 1rem; background: #e5e7eb; color: #374151; border: none;
      border-radius: .375rem; cursor: pointer; font-size: .875rem;
    }
    .btn-save {
      padding: .5rem 1rem; background: #2563eb; color: #fff; border: none;
      border-radius: .375rem; cursor: pointer; font-size: .875rem;
    }

    .empty { text-align: center; padding: 2rem; color: #9ca3af; font-size: .875rem; }

    .toast {
      position: fixed; bottom: 1rem; right: 1rem; padding: .75rem 1.25rem;
      border-radius: .375rem; color: #fff; font-size: .875rem; z-index: 2000;
      opacity: 0; transition: opacity .3s;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }

    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff; padding: 2rem; border-radius: .5rem; box-shadow: 0 4px 12px rgba(0,0,0,.1);
      width: 400px; max-width: 95vw;
    }
    .login-box h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .login-box p { font-size: .875rem; color: #6b7280; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: .625rem .75rem; border: 1px solid #d1d5db;
      border-radius: .375rem; font-size: .875rem; margin-bottom: .75rem;
    }
    .login-box button {
      width: 100%; padding: .625rem; background: #2563eb; color: #fff; border: none;
      border-radius: .375rem; cursor: pointer; font-size: .875rem; font-weight: 500;
    }
    .login-box button:hover { background: #1d4ed8; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <!-- Login screen -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <h1>🐛 Admin Login</h1>
      <p>Enter your admin API key to manage testers.</p>
      <input type="password" id="loginApiKey" placeholder="Admin API key" onkeypress="if(event.key==='Enter') authenticate()" />
      <button onclick="authenticate()">Sign In</button>
    </div>
  </div>

  <!-- Main admin UI -->
  <div class="container hidden" id="mainContent">
    <h1>👥 Tester Management</h1>

    <div class="nav">
      <a href="/admin">Domain Mappings</a>
      <a href="/admin/testers.html" class="active">Testers</a>
    </div>

    <button class="btn-add" onclick="openCreate()">+ Add Tester</button>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Created</th>
          <th>Last Login</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Create tester modal -->
  <div class="overlay" id="modal">
    <div class="modal">
      <h2>Add Tester</h2>
      <div class="field">
        <label for="fName">Name</label>
        <input id="fName" placeholder="John Doe" />
      </div>
      <div class="field">
        <label for="fEmail">Email</label>
        <input id="fEmail" type="email" placeholder="john@example.com" />
      </div>
      <div class="field">
        <label for="fPassword">Password</label>
        <input id="fPassword" type="password" placeholder="Minimum 8 characters" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveTester()">Create Tester</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.origin;
    let AUTH_KEY = null;

    function headers() {
      return { 'Content-Type': 'application/json', 'x-api-key': AUTH_KEY };
    }

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + type;
      setTimeout(() => el.className = 'toast', 3000);
    }

    async function authenticate() {
      const key = document.getElementById('loginApiKey').value.trim();
      if (!key) return toast('Please enter an API key', 'error');

      AUTH_KEY = key;
      
      // Test authentication
      try {
        const res = await fetch(`${API_BASE}/api/admin/testers`, {
          headers: headers()
        });
        
        if (res.status === 401 || res.status === 403) {
          toast('Invalid API key', 'error');
          AUTH_KEY = null;
          return;
        }

        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        
        loadTesters();
      } catch (err) {
        toast('Authentication failed', 'error');
        AUTH_KEY = null;
      }
    }

    async function loadTesters() {
      try {
        const res = await fetch(`${API_BASE}/api/admin/testers`, {
          headers: headers()
        });

        if (!res.ok) throw new Error('Failed to load testers');

        const data = await res.json();
        renderTesters(data.testers || []);
      } catch (err) {
        toast('Failed to load testers', 'error');
        document.getElementById('tbody').innerHTML = '<tr><td colspan="6" class="empty">Error loading testers</td></tr>';
      }
    }

    function renderTesters(testers) {
      const tbody = document.getElementById('tbody');
      
      if (testers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No testers yet. Click "Add Tester" to create one.</td></tr>';
        return;
      }

      tbody.innerHTML = testers.map(t => `
        <tr>
          <td>${escapeHtml(t.name)}</td>
          <td>${escapeHtml(t.email)}</td>
          <td>
            <span class="badge ${t.isActive ? 'badge-active' : 'badge-inactive'}">
              ${t.isActive ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td>${formatDate(t.createdAt)}</td>
          <td>${t.lastLoginAt ? formatDate(t.lastLoginAt) : '—'}</td>
          <td>
            <div class="actions">
              <button class="btn-sm btn-toggle" onclick="toggleStatus('${t.id}', ${!t.isActive})">
                ${t.isActive ? 'Disable' : 'Enable'}
              </button>
              <button class="btn-sm btn-delete" onclick="deleteTester('${t.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(isoString) {
      return new Date(isoString).toLocaleString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function openCreate() {
      document.getElementById('fName').value = '';
      document.getElementById('fEmail').value = '';
      document.getElementById('fPassword').value = '';
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    async function saveTester() {
      const name = document.getElementById('fName').value.trim();
      const email = document.getElementById('fEmail').value.trim();
      const password = document.getElementById('fPassword').value;

      if (!name || !email || !password) {
        return toast('All fields are required', 'error');
      }

      if (password.length < 8) {
        return toast('Password must be at least 8 characters', 'error');
      }

      try {
        const res = await fetch(`${API_BASE}/api/admin/testers`, {
          method: 'POST',
          headers: headers(),
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (!data.success) {
          toast(data.error || 'Failed to create tester', 'error');
          return;
        }

        toast('Tester created successfully!', 'success');
        closeModal();
        loadTesters();
      } catch (err) {
        toast('Failed to create tester', 'error');
      }
    }

    async function toggleStatus(id, newStatus) {
      try {
        const res = await fetch(`${API_BASE}/api/admin/testers/${id}/status`, {
          method: 'PATCH',
          headers: headers(),
          body: JSON.stringify({ isActive: newStatus })
        });

        const data = await res.json();

        if (!data.success) {
          toast(data.error || 'Failed to update status', 'error');
          return;
        }

        toast(`Tester ${newStatus ? 'enabled' : 'disabled'}`, 'success');
        loadTesters();
      } catch (err) {
        toast('Failed to update tester', 'error');
      }
    }

    async function deleteTester(id) {
      if (!confirm('Are you sure you want to delete this tester? This action cannot be undone.')) {
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/admin/testers/${id}`, {
          method: 'DELETE',
          headers: headers()
        });

        const data = await res.json();

        if (!data.success) {
          toast(data.error || 'Failed to delete tester', 'error');
          return;
        }

        toast('Tester deleted', 'success');
        loadTesters();
      } catch (err) {
        toast('Failed to delete tester', 'error');
      }
    }
  </script>
</body>
</html>
